# 书签组列表
bookmark:
  # 示例组1：开发工具
  - name: "开发工具"
    # 该组下的书签项
    items:
      - name: "GitHub"
        url: "https://github.com"
        icon: "https://github.com/favicon.ico"
      
      - name: "GitLab"
        url: "https://gitlab.com"
      - name: "Stack Overflow"
        url: "https://stackoverflow.com"
      - name: "Docker Hub"
        url: "https://hub.docker.com"

  # 示例组2：技术博客（演示组级别配置）
  - name: "技术博客"
    items:
      - name: "技术博客1"
        url: "https://blog.example.com"
      
      - name: "技术博客2"
        url: "https://blog2.example.com"

  # 示例组3：嵌套组（支持多级嵌套）
  - name: "编程语言"
    items:
      - name: "Python 官网"
        url: "https://www.python.org"
      
      - name: "Go 官网"
        url: "https://go.dev"
    
    # 嵌套的子组
    groups:
      - name: "Python 资源"
        items:
          - name: "PyPI"
            url: "https://pypi.org"
          - name: "Python 文档"
            url: "https://docs.python.org"
      
      - name: "Go 资源"
        items:
          - name: "Go 包仓库"
            url: "https://pkg.go.dev"
          - name: "Go 文档"
            url: "https://pkg.go.dev/std"

  # 示例组4：使用 include 引入外部配置文件
  - name: "外部配置"
    items:
      - name: "示例网站"
        url: "https://example.com"
     
